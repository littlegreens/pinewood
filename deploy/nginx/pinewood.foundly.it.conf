server {
  listen 80;
  listen [::]:80;
  server_name pinewood.foundly.it;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name pinewood.foundly.it;

  # Let us keep your current LetsEncrypt paths.
  ssl_certificate /etc/letsencrypt/live/pinewood.foundly.it/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pinewood.foundly.it/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /var/www/pinewood/client/dist;
  index index.html;

  # API backend
  location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # User files (avatars + GPX)
  location /uploads/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # PWA: always fetch service worker fresh
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # PWA assets generated by Vite
  location = /manifest.webmanifest {
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
